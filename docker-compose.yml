services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sabthok
      POSTGRES_USER: sabthok
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sabthok_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabthok"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN:-localhost},backend
      POSTGRES_DB: sabthok
      POSTGRES_USER: sabthok
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sabthok_secret}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      SECURE_SSL_REDIRECT: "False"
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@sabthok.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SEED_DATA: ${SEED_DATA:-true}
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    expose:
      - "8000"

  celery:
    build: ./backend
    restart: unless-stopped
    entrypoint: []
    command: celery -A config worker -l info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      POSTGRES_DB: sabthok
      POSTGRES_USER: sabthok
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sabthok_secret}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/1

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media:/srv/media:ro
      - static:/srv/static:ro

volumes:
  pgdata:
  media:
  static:
  caddy_data:
  caddy_config:
